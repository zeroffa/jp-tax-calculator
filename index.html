<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本免稅 10% 快速換算器</title>
    <style>
        :root { --primary-color: #e60012; --bg-color: #f8f9fa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        h1 { color: var(--primary-color); text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .input-box { margin-bottom: 2rem; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1.5rem; box-sizing: border-box; transition: 0.3s; background: #fff; }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 8px rgba(230,0,18,0.1); }
        .result-area { background: #fff5f5; border-radius: 12px; padding: 1.5rem; margin-top: 1rem; }
        .result-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .label-text { color: #666; font-size: 1rem; }
        .value-text { font-weight: 700; font-size: 1.8rem; color: var(--primary-color); }
        .tax-text { color: #28a745; font-weight: 600; font-size: 1.1rem; }
        .explain { font-size: 0.9rem; color: #888; line-height: 1.6; margin-top: 2rem; border-top: 1px dashed #ddd; padding-top: 1.5rem; }
        code { background: #eee; padding: 2px 5px; border-radius: 4px; font-family: monospace; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h1>🇯🇵 日本免稅換算器</h1>
    
    <div class="input-box">
        <label for="price">請輸入含稅價格 (稅込)</label>
        <input type="number" id="price" placeholder="例如: 129800" oninput="calculate()">
    </div>

    <div class="result-area">
        <div class="result-row">
            <span class="label-text">免稅後支付金額</span>
            <span class="value-text" id="finalPrice">¥ 0</span>
        </div>
        <div class="result-row">
            <span class="label-text">省下的稅金 (10%)</span>
            <span class="tax-text" id="taxSaved">¥ 0</span>
        </div>
    </div>

    <div class="explain">
        <strong>💡 為什麼不是打 9 折？</strong><br>
        免稅是「把外掛的 10% 稅金拿掉」，數學邏輯是 <code>含稅價 ÷ 1.1 = 免稅價</code>。<br>
        <br>
        如果你直接打 9 折 (× 0.9)，會連商品本體都多扣了錢，店家是不會這樣算的喔！<br>
        <br>
        <strong>📌 小撇步：</strong><br>
        想快速估算，請用 <code>含稅價 × 0.91</code>，這會比打 9 折精準得多。
    </div>
</div>

<script>
    function calculate() {
        const input = document.getElementById('price').value;
        const finalElem = document.getElementById('finalPrice');
        const taxElem = document.getElementById('taxSaved');
        
        if (input && input > 0) {
            // 使用 Math.round 修正 1.1 浮點數運算誤差
            const taxFree = Math.round(input / 1.1);
            const saved = input - taxFree;
            
            finalElem.innerText = '¥ ' + taxFree.toLocaleString();
            taxElem.innerText = '¥ ' + saved.toLocaleString();
        } else {
            finalElem.innerText = '¥ 0';
            taxElem.innerText = '¥ 0';
        }
    }
</script>

</body>
</html>
