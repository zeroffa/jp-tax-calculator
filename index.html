<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本免稅 10% 快速換算器</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #d32f2f; text-align: center; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.2rem; box-sizing: border-box; }
        input:focus { border-color: #d32f2f; outline: none; }
        .result { background: #fff8f8; border-left: 5px solid #d32f2f; padding: 1rem; margin-top: 1rem; }
        .result p { margin: 8px 0; font-size: 1.1rem; }
        .highlight { font-weight: bold; color: #d32f2f; font-size: 1.4rem; }
        .note { font-size: 0.85rem; color: #777; line-height: 1.5; margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇯🇵 日本免稅換算器</h2>
    
    <div class="input-group">
        <label for="price">請輸入含稅價格 (稅込)</label>
        <input type="number" id="price" placeholder="例如: 129800" oninput="calculate()">
    </div>

    <div class="result">
        <p>你最後要付的錢 (免稅價):</p>
        <p class="highlight" id="taxFreePrice">¥ 0</p>
        <p>省下的稅金 (10%):</p>
        <p id="taxAmount" style="color: #388e3c; font-weight: bold;">¥ 0</p>
    </div>

    <div class="note">
        <strong>💡 為什麼不是打 9 折？</strong><br>
        免稅的邏輯是「把外掛的 10% 稅金拿掉」，數學公式是：<br>
        <code>含稅價 ÷ 1.1 = 免稅價</code><br><br>
        如果你直接打 9 折，會連商品本體都多扣了錢，大相機是不會答應的喔！<br>
        (公式換算：10% 稅金約佔總價的 9.09%)
    </div>
</div>

<script>
    function calculate() {
        const price = document.getElementById('price').value;
        if (price > 0) {
            // 日本免稅正確公式：含稅價 / 1.1
            const taxFree = Math.floor(price / 1.1);
            const tax = price - taxFree;
            
            document.getElementById('taxFreePrice').innerText = '¥ ' + taxFree.toLocaleString();
            document.getElementById('taxAmount').innerText = '¥ ' + tax.toLocaleString();
        } else {
            document.getElementById('taxFreePrice').innerText = '¥ 0';
            document.getElementById('taxAmount').innerText = '¥ 0';
        }
    }
</script>

</body>
</html>
